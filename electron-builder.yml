appId: com.otomasyon.whatsapp
productName: WhatsApp Otomasyon
directories:
  output: release
  buildResources: build

files:
  - dist-electron/**/*
  - package.json
  - "!**/*.map"

# better-sqlite3's .node binary can't execute from inside the asar archive.
asarUnpack:
  - "**/node_modules/better-sqlite3/**"

# Native modules are rebuilt against Electron's ABI via the "postinstall"
# script (electron-builder install-app-deps), so skip electron-builder's own
# rebuild pass to avoid doing it twice.
npmRebuild: false

# Pre-assembled by scripts/prepare-resources.mjs (part of `npm run build`) —
# copying .next/standalone directly via extraResources filters silently
# dropped nested packages (e.g. node_modules/next itself).
extraResources:
  - from: resources
    to: .
    filter: ["**/*"]

mac:
  target:
    - dmg
    - zip
  category: public.app-category.business
  hardenedRuntime: true
  gatekeeperAssess: false

win:
  target:
    - nsis
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

# Used by the local `npm run release:mac`/`release:win` convenience scripts
# (electron-builder --publish always talks to GitHub directly). CI does NOT
# use electron-builder's publish step at all (see .github/workflows/release.yml
# — it builds with --publish never and uploads assets itself via `gh release
# upload` onto a release it creates explicitly, which sidesteps electron-builder's
# own release lookup turning out to be unreliable across separate CI jobs).
#
# TEMPORARY for testing: publishing straight to the (now public) source repo
# using a GitHub token with plain repo access, so no separate PAT setup is
# needed yet. Before going back to a private source repo, switch this back to
# the separate public releases repo (see git history) and use a scoped PAT.
publish:
  provider: github
  owner: hamzaalmali
  repo: whatsapp-otomasyon
